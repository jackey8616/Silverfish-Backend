name: Fetcher liveness

on:
  schedule:
    # Daily at 03:00 UTC (~11:00 Taipei). Adjust as desired.
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  liveness:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Rod-based fetchers (aixdzs, jmd8) need a browser binary on PATH.
      # fetcher_base.chromiumBin uses rod's LookPath, which finds
      # `chromium` / `chromium-browser` automatically.
      - name: Install Chromium for go-rod
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          chromium-browser --version

      - name: Run fetcher liveness tests
        env:
          # Override per-fetcher sample URLs via repository variables. Leave
          # unset to use the in-repo defaults; set to "SKIP" to bypass.
          SILVERFISH_TEST_URL_HJWZW:    ${{ vars.SILVERFISH_TEST_URL_HJWZW }}
          SILVERFISH_TEST_URL_AIXDZS:   ${{ vars.SILVERFISH_TEST_URL_AIXDZS }}
          SILVERFISH_TEST_URL_TTKAN:    ${{ vars.SILVERFISH_TEST_URL_TTKAN }}
          SILVERFISH_TEST_URL_MANGABZ:  ${{ vars.SILVERFISH_TEST_URL_MANGABZ }}
          SILVERFISH_TEST_URL_BAOZIMH:  ${{ vars.SILVERFISH_TEST_URL_BAOZIMH }}
          SILVERFISH_TEST_URL_JMD8:     ${{ vars.SILVERFISH_TEST_URL_JMD8 }}
        run: |
          go test -tags=live -v -timeout=10m \
            -run 'TestNovelFetchersLive|TestComicFetchersLive' \
            ./silverfish/usecase/...
